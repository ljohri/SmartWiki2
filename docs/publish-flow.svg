<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 200" width="920" height="200" role="img" aria-labelledby="title desc">
  <title id="title">SmartWiki2 publish pipeline</title>
  <desc id="desc">wiki_vault content syncs to Quartz, builds to site directory, served at slash</desc>
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#475569"/>
    </marker>
    <style>
      .box { fill: #f8fafc; stroke: #334155; stroke-width: 1.25; rx: 8; }
      .accent { fill: #eef2ff; stroke: #4f46e5; stroke-width: 1.25; rx: 8; }
      .title { font: 600 12px ui-sans-serif, system-ui, sans-serif; fill: #0f172a; }
      .mono { font: 11px ui-monospace, monospace; fill: #334155; }
      .note { font: 11px ui-sans-serif, system-ui, sans-serif; fill: #64748b; }
      .line { stroke: #475569; stroke-width: 1.5; fill: none; marker-end: url(#arr); }
    </style>
  </defs>

  <rect class="accent" x="16" y="24" width="168" height="88"/>
  <text class="title" x="28" y="48">wiki_vault</text>
  <text class="mono" x="28" y="68">content/**/*.md</text>
  <text class="mono" x="28" y="86">content/attachments/</text>
  <text class="note" x="28" y="106">publishable source</text>

  <line class="line" x1="184" y1="68" x2="228" y2="68"/>

  <rect class="box" x="228" y="36" width="148" height="64"/>
  <text class="title" x="240" y="60">Sync</text>
  <text class="mono" x="240" y="80">ĺ quartz/content</text>

  <line class="line" x1="376" y1="68" x2="420" y2="68"/>

  <rect class="box" x="420" y="36" width="132" height="64"/>
  <text class="title" x="432" y="60">Build</text>
  <text class="mono" x="432" y="80">npm run build</text>

  <line class="line" x1="552" y1="68" x2="596" y2="68"/>

  <rect class="box" x="596" y="36" width="120" height="64"/>
  <text class="title" x="608" y="60">Site output</text>
  <text class="mono" x="608" y="80">/app/site</text>

  <line class="line" x1="716" y1="68" x2="760" y2="68"/>

  <rect class="accent" x="760" y="36" width="144" height="64"/>
  <text class="title" x="772" y="60">FastAPI</text>
  <text class="mono" x="772" y="80">GET /</text>

  <rect class="box" x="16" y="132" width="888" height="52" rx="8" fill="#fff7ed" stroke="#ea580c" stroke-width="1.25"/>
  <text class="title" x="28" y="154" fill="#9a3412">Not in this pipeline</text>
  <text class="mono" x="28" y="172" fill="#7c2d12">wiki_vault/raw/**</text>
  <text class="note" x="168" y="172"> originals stay on disk until you author pages under content/ (or reference them from Markdown).</text>
</svg>
