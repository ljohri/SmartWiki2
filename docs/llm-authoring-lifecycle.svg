<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 560" width="1280" height="560" role="img" aria-labelledby="title desc">
  <title id="title">LLM authoring lifecycle for SmartWiki2</title>
  <desc id="desc">Compile, classify, synthesize, lint, index, and write-back workflow for vault content generation</desc>
  <defs>
    <marker id="arr2" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#475569"/>
    </marker>
    <style>
      .panel { fill: #ffffff; stroke: #94a3b8; stroke-width: 1.25; rx: 12; }
      .h { font: 700 18px ui-sans-serif, system-ui, sans-serif; fill: #0f172a; }
      .sub { font: 600 14px ui-sans-serif, system-ui, sans-serif; fill: #1e293b; }
      .txt { font: 12px ui-sans-serif, system-ui, sans-serif; fill: #334155; }
      .mono { font: 12px ui-monospace, monospace; fill: #334155; }
      .stage { fill: #eef2ff; stroke: #5b66d6; stroke-width: 1.2; rx: 8; }
      .data { fill: #e8f3ef; stroke: #3f7f67; stroke-width: 1.2; rx: 8; }
      .warn { fill: #fff7e8; stroke: #c08429; stroke-width: 1.2; rx: 8; }
      .line { stroke: #475569; stroke-width: 1.5; fill: none; marker-end: url(#arr2); }
      .dashed { stroke-dasharray: 5 4; }
    </style>
  </defs>

  <text class="h" x="32" y="34">LLM AUTHORING LIFECYCLE (CURRENT FLOW + TARGET EXPANSION)</text>

  <rect class="panel" x="20" y="56" width="1240" height="324"/>
  <text class="sub" x="38" y="86">Pipeline stages</text>

  <!-- Inputs -->
  <rect class="data" x="42" y="108" width="190" height="86"/>
  <text class="sub" x="58" y="132">Inputs</text>
  <text class="mono" x="58" y="154">wiki_vault/raw/**</text>
  <text class="mono" x="58" y="172">wiki_vault/content/**</text>

  <!-- Stage 1 -->
  <rect class="stage" x="270" y="108" width="170" height="86"/>
  <text class="sub" x="290" y="132">1. Compile</text>
  <text class="txt" x="290" y="154">extract and normalize</text>
  <text class="txt" x="290" y="172">source context</text>

  <!-- Stage 2 -->
  <rect class="stage" x="478" y="108" width="170" height="86"/>
  <text class="sub" x="498" y="132">2. Classify</text>
  <text class="txt" x="498" y="154">project/concept/entity</text>
  <text class="txt" x="498" y="172">source-note/synthesis</text>

  <!-- Stage 3 -->
  <rect class="stage" x="686" y="108" width="190" height="86"/>
  <text class="sub" x="706" y="132">3. Author</text>
  <text class="txt" x="706" y="154">draft or update pages</text>
  <text class="txt" x="706" y="172">frontmatter + body</text>

  <!-- Stage 4 -->
  <rect class="stage" x="914" y="108" width="170" height="86"/>
  <text class="sub" x="934" y="132">4. Link/Index</text>
  <text class="txt" x="934" y="154">repair wikilinks</text>
  <text class="txt" x="934" y="172">update index/logs</text>

  <!-- Stage 5 -->
  <rect class="stage" x="1104" y="108" width="136" height="86"/>
  <text class="sub" x="1118" y="132">5. Lint</text>
  <text class="txt" x="1118" y="154">health checks</text>
  <text class="txt" x="1118" y="172">quality gates</text>

  <!-- Writeback -->
  <rect class="data" x="800" y="238" width="260" height="112"/>
  <text class="sub" x="820" y="262">Durable write-back</text>
  <text class="mono" x="820" y="286">wiki_vault/content/**</text>
  <text class="mono" x="820" y="306">manifests/pages.jsonl</text>
  <text class="mono" x="820" y="326">manifests/links.jsonl</text>

  <rect class="warn" x="1104" y="238" width="136" height="112"/>
  <text class="sub" x="1118" y="262">Publish</text>
  <text class="txt" x="1118" y="286">sync -> build</text>
  <text class="txt" x="1118" y="306">serve site</text>
  <text class="mono" x="1118" y="326">/app/site</text>

  <!-- Current vs target -->
  <rect class="panel" x="20" y="398" width="1240" height="142"/>
  <text class="sub" x="38" y="428">Status in current codebase</text>
  <text class="txt" x="38" y="452">Current: ingest registers source + log and triggers publish; query uses OpenRouter for read-only Q&A.</text>
  <text class="txt" x="38" y="472">Target: stages 1-5 become an authoring loop that writes/updates durable wiki pages and links before publish.</text>
  <text class="txt" x="38" y="492">Guardrail: keep publish deterministic; LLM writes happen in vault content/manifests, then existing publish flow runs unchanged.</text>

  <!-- Lines -->
  <line class="line" x1="232" y1="151" x2="270" y2="151"/>
  <line class="line" x1="440" y1="151" x2="478" y2="151"/>
  <line class="line" x1="648" y1="151" x2="686" y2="151"/>
  <line class="line" x1="876" y1="151" x2="914" y2="151"/>
  <line class="line" x1="1084" y1="151" x2="1104" y2="151"/>

  <line class="line" x1="781" y1="194" x2="910" y2="238"/>
  <line class="line" x1="999" y1="194" x2="960" y2="238"/>
  <line class="line" x1="1172" y1="194" x2="1172" y2="238"/>
  <line class="line" x1="1060" y1="294" x2="1104" y2="294"/>

  <!-- Feedback loop -->
  <path class="line dashed" d="M930 350 C700 376, 520 358, 355 200"/>
  <text class="txt" x="606" y="368">feedback loop: lint findings -> re-author</text>
</svg>
